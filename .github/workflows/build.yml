name: Build Aura Prueba

on:
  push:
    branches: [ master ]

jobs:
  # =======================================================
  # TRABAJO 1: COMPILAR EL APK (Android)
  # =======================================================
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/aura_prueba_key.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEY_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=aura_prueba_key.jks" >> android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aura-prueba-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # =======================================================
  # TRABAJO 2: COMPILAR WINDOWS Y CREAR INSTALADOR .EXE
  # =======================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Habilitar Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Reparar archivos viejos de Windows
        run: flutter create --platforms=windows .

      - name: Obtener dependencias
        run: flutter pub get

      - name: Compilar Windows
        run: flutter build windows --release

      - name: Instalar NSIS en el servidor Windows
        run: choco install nsis -y

      - name: Generar el instalador con NSIS
        run: makensis installer.nsi

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: aura-windows-instalador
          path: Instalador_Aura_Estandar.exe
